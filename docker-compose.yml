version: '3.8'

services:
  gpu-model-monitor:
    build: .
    container_name: gpu-model-monitor
    pid: "host"  # Required for process tracking
    ports:
      - "8081:8081"
    environment:
      - TZ=America/Los_Angeles
      # MQTT Configuration (optional - remove or set MQTT_ENABLED=false to disable)
      - MQTT_ENABLED=false
      - MQTT_HOST=mqtt.example.com
      - MQTT_PORT=1883
      - MQTT_SSL=false
      - MQTT_USERNAME=your_mqtt_username
      - MQTT_PASSWORD=your_mqtt_password
      - MQTT_TOPIC_PREFIX=gpu_monitor
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./history:/app/history:rw
      - ./logs:/app/logs:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    runtime: nvidia
