services:
  gpu-model-monitor:
    container_name: GPU-Model-Monitor
    image: ghcr.io/loryanstrant/gpu-model-monitor:latest
    pid: "host"
    ports:
      - "8081:8081"
    environment:
      - TZ=Australia/Melbourne
      # MQTT Configuration
      - MQTT_ENABLED=true
      - MQTT_HOST=mqtt.local
      - MQTT_PORT=1883
      - MQTT_SSL=false
      - MQTT_USERNAME=mqtt
      - MQTT_PASSWORD=mqtt
      - MQTT_TOPIC_PREFIX=gpu_monitor
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/GPU-Model-Monitor/history:/app/history:rw
      - /home/docker/GPU-Model-Monitor/logs:/app/logs:rw
    restart: unless-stopped
    gpus: "all"
